syntax = "proto3";

package tgwatch;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alexbilevskiy/tgwatch/internal/generated/pb/api";

service TgwatchService {
  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
  }
  rpc SearchPublicPosts(SearchPublicPostsRequest) returns (SearchPublicPostsResponse) {
  }
  rpc SearchPublicPostsFiltered(SearchPublicPostsFilteredRequest) returns (SearchPublicPostsFilteredResponse) {}
}

message GetMeRequest {

}

message GetMeResponse {
  int64 id = 1;
  string username = 2;
  string name = 3;
}

message SearchPublicPostsRequest {
  string query = 1;
  string offset = 2;
}

message SearchPublicPostsResponse {
  repeated Message found_messages = 1;
}

message SearchPublicPostsFilteredRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchPublicPostsFilteredResponse {
  repeated FilteredMessage found_messages = 1;
}

message Message {
  int64 id = 1;
  int64 chat_id = 2;
  string link = 3;
  string sender_name = 4;
  google.protobuf.Timestamp date = 5;
  string text = 6;
}

message FilteredMessage {
  enum Source {
    SOURCE_UNKNOWN = 0;
    SOURCE_FROM_SEARCH = 1;
    SOURCE_LINK_CRAWL = 2;
  }
  enum Verdict {
    VERDICT_UNKNOWN = 0;
    VERDICT_OK_ONLY_CHANNEL_LINKS = 1;
    VERDICT_FAIL_HAS_MESSAGE_LINKS = 2;
    VERDICT_OK_NO_VALID_LINKS = 3;
  }

  int64 id = 1;
  int64 chat_id = 2;
  string link = 3;
  Source source = 4;
  Verdict verdict = 5;
  string sender_name = 6;
  google.protobuf.Timestamp date = 7;
  string text = 8;
  repeated string links = 9;
  repeated string filtered_links = 10;
}


