version: v1
plugins:
  - name: go
    path: protoc-gen-go
    out: internal/generated/pb
    opt:
      - paths=source_relative
  - name: go-grpc
    path: protoc-gen-go-grpc
    out: internal/generated/pb
    opt:
      - paths=source_relative
  - name: grpc-gateway
    path: protoc-gen-grpc-gateway
    out: internal/generated/pb
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
